# 24/7 production stack for a VPS (inferreview.com).
# MLC + Grafana + Prometheus + Cloudflare Tunnel on one Docker network.
#
# Usage:
#   cp .env.prod.example .env.prod
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up --build -d
#
# Cloudflare public hostnames (same tunnel token as hybrid):
#   mlc.inferreview.com     -> http://mlc-gateway:80
#   grafana.inferreview.com -> http://grafana:3000
#
# Stop the PC hybrid stack before running this on a VPS with the same tunnel token.

name: inferreview-prod

services:
  mlc-llm:
    build:
      context: ./mlc-mock
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      MLC_API_KEY: ${MLC_API_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - inferreview

  mlc-gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${MLC_GATEWAY_HOST_BIND:-127.0.0.1}:${MLC_GATEWAY_PORT:-8787}:80"
    volumes:
      - ./nginx/mlc-gateway.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      mlc-llm:
        condition: service_healthy
    networks:
      - inferreview

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_HOST_BIND:-127.0.0.1}:${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus-hybrid.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    depends_on:
      mlc-llm:
        condition: service_healthy
    networks:
      - inferreview

  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    ports:
      - "${GRAFANA_HOST_BIND:-127.0.0.1}:${GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change-me}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-https://grafana.inferreview.com}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - inferreview

  cloudflared:
    image: cloudflare/cloudflared:2025.2.1
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:?Set CLOUDFLARE_TUNNEL_TOKEN in .env.prod}
    depends_on:
      mlc-gateway:
        condition: service_started
      grafana:
        condition: service_started
    networks:
      - inferreview

networks:
  inferreview:
    name: inferreview-prod

volumes:
  grafanadata:
  prometheusdata:
