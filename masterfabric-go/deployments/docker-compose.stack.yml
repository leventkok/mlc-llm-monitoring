# Local Docker stack for app-review-monitoring (NOT for production).
# Usage from masterfabric-go/deployments:
#   docker compose -f docker-compose.stack.yml --env-file .env.docker up --build
# Scale backends:
#   docker compose -f docker-compose.stack.yml up --build --scale backend=2

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-app_review}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app_review}"]
      interval: 5s
      timeout: 5s
      retries: 10

  mlc-llm:
    build:
      context: ./mlc-mock
      dockerfile: Dockerfile
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Replace this service with a real MLC LLM image when GPU is available.

  backend:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    environment:
      GO_ENV: development
      SERVER_HOST: 0.0.0.0
      PORT: "8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/${POSTGRES_DB:-app_review}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-dev-only-secret-change-in-production-local}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      MLC_LLM_ENABLED: "true"
      MLC_LLM_BASE_URL: http://mlc-llm:8080
      MLC_LLM_MODEL: gemma-2-2b-it-q4f16_1-MLC
      METRICS_ENABLED: "true"
      OTEL_SERVICE_NAME: app-review-monitoring-api
      LOG_LEVEL: info
      LOG_FORMAT: json
    depends_on:
      postgres:
        condition: service_healthy
      mlc-llm:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s

  gateway:
    image: nginx:1.27-alpine
    ports:
      - "${GATEWAY_HOST_BIND:-127.0.0.1}:${GATEWAY_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      mlc-llm:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.55.1
    ports:
      - "${PROMETHEUS_HOST_BIND:-127.0.0.1}:${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      backend:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.4.0
    ports:
      - "${GRAFANA_HOST_BIND:-127.0.0.1}:${GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  pgdata:
  grafanadata:
