upstream backend_upstream {
    least_conn;
    server backend:8080 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream mlc_upstream {
    least_conn;
    server mlc-llm:8080 max_fails=3 fail_timeout=30s;
    keepalive 8;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 1m;

    location /health {
        proxy_pass http://backend_upstream/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /ready {
        proxy_pass http://backend_upstream/ready;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /metrics {
        proxy_pass http://backend_upstream/metrics;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /llm/ {
        rewrite ^/llm/(.*)$ /$1 break;
        proxy_pass http://mlc_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
    }

    location / {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
    }
}
