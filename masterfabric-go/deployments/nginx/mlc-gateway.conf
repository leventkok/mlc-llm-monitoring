# Public-facing reverse proxy for MLC only (hybrid Render + local GPU/mock).
# Exposes health + OpenAI-compatible chat; everything else returns 404.

upstream mlc_upstream {
    server mlc-llm:8080 max_fails=3 fail_timeout=30s;
    keepalive 8;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 1m;

    location /health {
        proxy_pass http://mlc_upstream/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /v1/ {
        proxy_pass http://mlc_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location / {
        return 404;
    }
}
