services:
  - type: web
    name: app-review-monitoring-api
    runtime: go
    plan: free
    branch: main
    rootDir: masterfabric-go
    buildCommand: go build -tags netgo -ldflags '-s -w' -o server ./cmd/server
    startCommand: ./server
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GO_ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: https://mlc-llm-monitoring.vercel.app
      - key: MLC_LLM_ENABLED
        sync: false
      - key: MLC_LLM_BASE_URL
        sync: false
      - key: MLC_LLM_API_KEY
        sync: false
      - key: METRICS_ENABLED
        value: "true"
